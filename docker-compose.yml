services:
  chroma:
    restart: unless-stopped
    image: chromadb/chroma:latest
    container_name: chroma
    volumes:
      - ./local/chromaData:/data
    expose:
      - 8000
    ports:
      - 8000:8000
    networks:
      - main
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q nanosecond'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  embedding:
    restart: unless-stopped
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: embedding
    volumes:
      - ./local/models:/models
    expose:
      - 8000
    networks:
      - main
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -m /models/Qwen3-Embedding-0.6B-f16.gguf
      --host 0.0.0.0
      --port 8000
      --embedding
      --n-gpu-layers 99
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  main:
