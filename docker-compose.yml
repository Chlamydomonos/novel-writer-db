services:
  chroma:
    restart: unless-stopped
    image: chromadb/chroma:latest
    container_name: chroma
    volumes:
      - ./local/chromaData:/data
    expose:
      - 8000
    networks:
      - main
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q nanosecond'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  embedding:
    restart: unless-stopped
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: embedding
    volumes:
      - ./local/models:/models
    expose:
      - 8000
    networks:
      - main
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      -m /models/Qwen3-Embedding-0.6B-f16.gguf
      --host 0.0.0.0
      --port 8000
      --embedding
      --n-gpu-layers 99
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: backend
    depends_on:
      chroma:
        condition: service_healthy
      embedding:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      # nginx 是另一个容器，backend 必须绑到 0.0.0.0 才能被反代访问
      HOST: "0.0.0.0"
    expose:
      - "3000"
    volumes:
      # SQLite 持久化：db/sequelize.ts 中 storage: '/data/db.sqlite3'
      - ./local/backendData:/data
    networks:
      - main

  # nginx 是整个 compose 对外的唯一出口（:80）：
  #   - 静态托管前端 dist（packages/frontend/dist）
  #   - 反代 /api/* → backend:3000
  #   - 反代 /mcp   → backend:3000（关 buffering 支持流式）
  nginx:
    restart: unless-stopped
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: nginx
    depends_on:
      - backend
    ports:
      # 宿主机对外端口 3912 → 容器内 nginx :80
      - "3912:80"
    networks:
      - main

networks:
  main:
