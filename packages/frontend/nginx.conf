# nginx 配置：唯一对外出口（:80），同时承载前端静态产物与后端反代。
# 文件由 packages/frontend/Dockerfile 在构建阶段复制到镜像内
# /etc/nginx/conf.d/default.conf。
#
# 路由约定（详见 docs/deployment.md）：
#   - GET /                     → 前端 SPA (index.html)
#   - GET /assets/*             → Vite 构建产物（带 hash，可强缓存）
#   - 任意方法 /api/*            → 反代 backend:3000（保留 /api/ 前缀）
#   - 任意方法 /mcp（精确匹配）  → 反代 backend:3000（关闭 buffering 以支持流式）

server {
    listen 80;
    server_name _;

    # 前端静态产物（Dockerfile 中复制到 /usr/share/nginx/html）
    root /usr/share/nginx/html;
    index index.html;

    # compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss text/javascript
               image/svg+xml;

    # Vite 构建产物（基于 git rev 搜索路径) 含 hash，启用强缓存
    location ^~ /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # favicon / 静态根文件
    location = /favicon.ico {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # 后端 REST API（前缀匹配；proxy_pass 末尾不加斜杠，保留 /api/ 前缀）
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MCP Streamable HTTP endpoint
    # 用精确匹配（location =），确保不被下方 / 的 SPA fallback 拦截。
    # 关闭 proxy_buffering、放宽超时，以支持 SSE / 长连接流式。
    location = /mcp {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 1h;
    }

    # SPA fallback：所有未匹配的路径回退到 index.html，交给前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
